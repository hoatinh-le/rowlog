<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RowLog — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    html, body { overflow: auto; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Row<span>Log</span></div>
    <div class="auth-subtitle">Training Logger — Sign in to your account</div>

    <div id="login-error" class="auth-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <a href="#" id="forgot-link" class="auth-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Sign In</button>
    </form>

    <div class="auth-divider"></div>
    <div style="text-align:center">
      <span style="font-size:12px;color:var(--text2)">Don't have an account? </span>
      <a href="register.html" class="auth-link">Create account</a>
    </div>
  </div>
</div>

<script type="module">
  import { initLoginPage, checkAuth } from '../js/auth.js'

  // If already logged in, redirect
  checkAuth().then(session => {
    if (session) window.location.href = '/pages/app.html'
  })

  initLoginPage()
</script>
</body>
</html>
