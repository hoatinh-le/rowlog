<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RowLog — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    html, body { overflow: auto; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Row<span>Log</span></div>
    <div class="auth-subtitle">Create your free training account</div>

    <div id="register-error" class="auth-error"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="e.g. jsmith_rowing" required autocomplete="username" minlength="3" pattern="[a-zA-Z0-9_]+">
        <div id="username-check" class="username-check"></div>
      </div>

      <div class="form-row form-row-2" style="gap:12px">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>
      </div>

      <div class="auth-divider"></div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text2);margin-bottom:12px">Optional details</div>

      <div class="form-row form-row-2" style="gap:12px">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-fullname" placeholder="Jane Smith" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Club</label>
          <input type="text" id="reg-club" placeholder="e.g. Leander Club">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">Create Account</button>
    </form>

    <div class="auth-divider"></div>
    <div style="text-align:center">
      <span style="font-size:12px;color:var(--text2)">Already have an account? </span>
      <a href="login.html" class="auth-link">Sign in</a>
    </div>
  </div>
</div>

<script type="module">
  import { initRegisterPage, checkAuth } from '../js/auth.js'

  // If already logged in, redirect
  checkAuth().then(session => {
    if (session) window.location.href = '/pages/app.html'
  })

  initRegisterPage()
</script>
</body>
</html>
